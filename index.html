<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Launcher</title>

<style>

*{
font-family:system-ui,-apple-system,Segoe UI,Roboto;
color:white;
}

html,body{
margin:0;
height:100%;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
}

/* background */

#bg{
position:fixed;
inset:0;
background-size:cover;
background-position:center;
transition:opacity 1.5s ease;
z-index:-2;
}

/* dark overlay */

body::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.35);
z-index:-1;
}

.center{
display:flex;
flex-direction:column;
align-items:center;
}

/* clock */

#time{
font-size:110px;
font-weight:600;
}

/* greeting */

#greeting{
font-size:40px;
margin-top:10px;
}

/* search */

.search{
margin-top:25px;
}

.search input{
width:420px;
max-width:90vw;
padding:16px 20px;
border-radius:40px;
border:none;
font-size:18px;
background:rgba(255,255,255,.2);
backdrop-filter:blur(10px);
outline:none;
}

.search input::placeholder{
color:rgba(255,255,255,.8);
}

/* launcher buttons */

.launch{
margin-top:15px;
display:flex;
gap:10px;
}

.launch button{
background:rgba(255,255,255,.2);
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

/* weather */

.weather{
position:absolute;
top:20px;
right:30px;
font-size:18px;
}

/* quote */

.quote{
position:absolute;
bottom:25px;
width:100%;
text-align:center;
font-size:18px;
opacity:.9;
padding:0 20px;
}

</style>
</head>


<body>

<div id="bg"></div>

<div class="weather" id="weather">
Loading weather...
</div>

<div class="center">

<div id="time">--:--</div>

<div id="greeting"></div>

<div class="search">
<input id="search" placeholder="Search Google">
</div>

<div class="launch">
<button onclick="launch('blank')">about:blank</button>
<button onclick="launch('blob')">blob</button>
</div>

</div>

<div class="quote" id="quote"></div>

<script>

/* BACKGROUNDS */

const backgrounds=[

"https://images.unsplash.com/photo-1770490085047-1460359929e7?q=80&w=1974&auto=format&fit=crop",
"https://images.unsplash.com/photo-1772415912163-bd5fe16b8ff0?q=80&w=1974&auto=format&fit=crop",
"https://images.unsplash.com/photo-1772950399275-81eea958d92b?q=80&w=1886&auto=format&fit=crop",
"https://images.unsplash.com/photo-1769317996569-0a23b3f426f7?q=80&w=1470&auto=format&fit=crop",
"https://images.unsplash.com/photo-1768409234914-96f61529b7e2?q=80&w=1470&auto=format&fit=crop",
"https://images.unsplash.com/photo-1460355976672-71c3f0a4bdac?q=80&w=1469&auto=format&fit=crop",
"https://images.unsplash.com/photo-1468657988500-aca2be09f4c6?q=80&w=1470&auto=format&fit=crop",
"https://images.unsplash.com/photo-1476842634003-7dcca8f832de?q=80&w=1470&auto=format&fit=crop",
"https://images.unsplash.com/photo-1494376877685-d3d2559d4f82?q=80&w=1470&auto=format&fit=crop",
"https://images.unsplash.com/photo-1710438399422-2fca27686bcd?q=80&w=1470&auto=format&fit=crop",
"https://images.unsplash.com/photo-1479762937580-3b682a10a0d8?q=80&w=1932&auto=format&fit=crop",
"https://images.unsplash.com/photo-1574610758891-5b809b6e6e2e?q=80&w=1476&auto=format&fit=crop",
"https://images.unsplash.com/photo-1614285457768-646f65ca8548?q=80&w=1470&auto=format&fit=crop",
"https://images.unsplash.com/photo-1499551660540-eaf0697882f5?q=80&w=1471&auto=format&fit=crop",
"https://images.unsplash.com/photo-1632749042303-7f7a18ed6ff0?q=80&w=1470&auto=format&fit=crop",
"https://images.unsplash.com/photo-1693237476029-f8469bb756a2?q=80&w=1932&auto=format&fit=crop",
"https://images.unsplash.com/photo-1697479670670-d2a299df749c?q=80&w=2045&auto=format&fit=crop",
"https://images.unsplash.com/photo-1633436245198-44bc17f86b89?q=80&w=1932&auto=format&fit=crop"


]

const bg=document.getElementById("bg")

bg.style.opacity=0
bg.style.backgroundImage=`url(${backgrounds[Math.floor(Math.random()*backgrounds.length)]})`

setTimeout(()=>{bg.style.opacity=1},100)


/* QUOTES */

const quotes=[

"Small progress is still progress.",
"Stay curious.",
"The best way to start is to start.",
"Dream big. Start small.",
"Consistency beats motivation.",
"Every day is a fresh start.",
"Make today count.",
"Great things take time.",
"Focus on the next step.",
"Your future self is watching."

]

document.getElementById("quote").textContent =
quotes[Math.floor(Math.random()*quotes.length)]


/* NAME */

let username=localStorage.getItem("launcherName")

if(!username){

username=prompt("What's your name?")

if(!username || username.trim()==="")
username="friend"

localStorage.setItem("launcherName",username)

}


/* CLOCK */

function updateClock(){

const d=new Date()

document.getElementById("time").textContent =
d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})

let h=d.getHours()

let greet="Hello"

if(h<12) greet="Good morning"
else if(h<18) greet="Good afternoon"
else greet="Good evening"

document.getElementById("greeting").textContent =
`${greet}, ${username}.`

}

setInterval(updateClock,1000)
updateClock()


/* SEARCH */

document.getElementById("search").addEventListener("keydown",e=>{

if(e.key==="Enter"){

window.open("https://google.com/search?q="+e.target.value)

}

})


/* WEATHER */

async function weather(lat,lon){

try{

const r=await fetch(
`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`
)

const j=await r.json()

document.getElementById("weather").innerText =
`${Math.round(j.current_weather.temperature)}°C`

}catch{

document.getElementById("weather").innerText="Weather unavailable"

}

}

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(p=>{
weather(p.coords.latitude,p.coords.longitude)
})

}


/* LAUNCHER */

const site="https://dicestack88.github.io"

function launch(type){

const html=`
<!DOCTYPE html>
<html>
<body style="margin:0">
<iframe src="${site}" style="border:none;width:100%;height:100%"></iframe>
</body>
</html>
`

if(type==="blob"){

const blob=new Blob([html],{type:"text/html"})
window.open(URL.createObjectURL(blob))

}else{

const w=window.open("about:blank")
w.document.write(html)
w.document.close()

}

}

</script>

</body>
</html>
